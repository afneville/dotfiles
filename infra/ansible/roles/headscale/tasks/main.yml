---
- name: Download Headscale package
  ansible.builtin.get_url:
    url: "{{ headscale_deb_url }}"
    dest: "/tmp/headscale_{{ headscale_version }}.deb"
    mode: "0644"

- name: Install Headscale package
  ansible.builtin.apt:
    deb: "/tmp/headscale_{{ headscale_version }}.deb"
    state: present

- name: Check whether Headscale data is mounted
  ansible.builtin.command: mountpoint -q {{ headscale_data_dir }}
  register: headscale_data_mounted
  changed_when: false
  failed_when: false

- name: Stop Headscale before initial persistent data mount
  ansible.builtin.service:
    name: headscale
    state: stopped
  when: headscale_data_mounted.rc != 0

- name: Ensure persistent Headscale data directory exists
  ansible.builtin.file:
    path: "{{ headscale_data_source }}"
    state: directory
    owner: headscale
    group: headscale
    mode: "0750"

- name: Ensure Headscale state mountpoint exists
  ansible.builtin.file:
    path: "{{ headscale_data_dir }}"
    state: directory
    owner: headscale
    group: headscale
    mode: "0750"

- name: Bind mount persistent Headscale data
  ansible.posix.mount:
    path: "{{ headscale_data_dir }}"
    src: "{{ headscale_data_source }}"
    fstype: none
    opts: bind
    state: mounted

- name: Install Headscale config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ headscale_config_dir }}/config.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart headscale

- name: Install Headscale policy
  ansible.builtin.template:
    src: policy.hujson.j2
    dest: "{{ headscale_config_dir }}/policy.hujson"
    owner: root
    group: root
    mode: "0644"
  notify: Restart headscale

- name: Validate Headscale configuration
  ansible.builtin.command: runuser --user headscale -- headscale configtest
  changed_when: false

- name: Enable and start Headscale
  ansible.builtin.systemd_service:
    name: headscale
    state: started
    enabled: true
    daemon_reload: true

- name: Apply Headscale configuration
  ansible.builtin.meta: flush_handlers

- name: Read Headscale users
  ansible.builtin.command: headscale users list --output json
  register: headscale_users
  changed_when: false

- name: Create initial Headscale user
  ansible.builtin.command: headscale users create {{ headscale_user }}
  changed_when: true
  when: headscale_user not in (headscale_users.stdout | from_json | map(attribute='name') | list)
