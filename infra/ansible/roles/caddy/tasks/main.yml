---
- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: present

- name: Install Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_config_path }}"
    owner: root
    group: root
    mode: "0644"
    validate: caddy validate --config %s --adapter caddyfile

- name: Ensure Caddy is enabled
  ansible.builtin.service:
    name: caddy
    state: started
    enabled: true

- name: Load Caddy configuration
  ansible.builtin.service:
    name: caddy
    state: reloaded

- name: Wait for Caddy HTTPS listener
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 443
    timeout: 60
